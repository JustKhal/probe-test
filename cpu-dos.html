<!DOCTYPE html>
<html>
<head><title>KHAL_CPU_START</title></head>
<body>
<script>
const durationMs = 25000;
const marker = 'KHAL_DOS04_CPU_mathmix';
const started = performance.now();
let iterations = 0;
let x = 0;
while (performance.now() - started < durationMs) {
  x = (x + Math.sqrt((iterations % 1000) + 17)) % 1000003;
  iterations += 1;
}
document.title = marker + ' DONE iters=' + iterations + ' elapsed_ms=25000';
</script>
</body>
</html>
